appId: com.hdaw.daw
productName: HDAW
copyright: "Copyright 2026 HDAW"

directories:
  output: release
  buildResources: build-resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: ../build/Debug/
    to: engine/
    filter:
      - "HDAW_headless.exe"
      - "*.dll"

win:
  icon: build-resources/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: "${productName} ${version} Portable.exe"
